name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'index.md'
      - '404.md'
      - 'search.md'
      - '_config.yml'
      - '_data/**'
      - '_includes/**'
      - '_layouts/**'
      - '_pages/**'
      - 'docs/**'
      - 'changelog/**'
      - 'README.md'
      - 'README.zh-CN.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - 'LICENSE'
      - '.github/workflows/pages.yml'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Jekyll Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (sparse checkout)
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            index.md
            404.md
            search.md
            _config.yml
            _data
            _includes
            _layouts
            _pages
            docs
            changelog
            README.md
            README.zh-CN.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            LICENSE
            assets

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
          future: false
          incremental: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
