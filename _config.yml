title: YOLO-Toys
description: 多模型实时视觉识别系统 — YOLO 检测/分割/姿态 · DETR · OWL-ViT · Grounding DINO · BLIP Caption/VQA · WebSocket 流式推理
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
repository: LessUp/yolo-toys
show_downloads: false

# SEO & metadata
url: https://lessup.github.io
baseurl: /yolo-toys
lang: zh-CN
author: LessUp
logo: /yolo-toys/assets/logo.png

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default

# Exclude large / irrelevant files from Jekyll build
exclude:
  - "*.pt"
  - "*.onnx"
  - "*.engine"
  - .git
  - .github
  - .venv
  - .pytest_cache
  - .ruff_cache
  - __pycache__
  - node_modules
  - app
  - frontend
  - tests
  - runs
  - Dockerfile
  - docker-compose.yml
  - Makefile
  - requirements.txt
  - requirements-dev.txt
  - pyproject.toml
  - .pre-commit-config.yaml
  - .editorconfig
  - .env.example
  - .dockerignore
  - Gemfile
  - Gemfile.lock
  - vendor
