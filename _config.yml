# Site settings
title: YOLO-Toys
description: 多模型实时视觉识别系统 / Multi-Model Real-Time Vision Platform
tagline: FastAPI + WebSocket 实时物体识别
repository: "LessUp/yolo-toys"
url: "https://lessup.github.io"
baseurl: "/yolo-toys"

# Language settings
languages: ["zh", "en"]
default_lang: "zh"
exclude_from_localization: ["assets", "images", "favicon.ico", "js"]
parallel_localization: true

# Theme - Just The Docs v0.9.0
remote_theme: "just-the-docs/just-the-docs@v0.9.0"

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  - jekyll-relative-links
  - jekyll-include-cache

# Just The Docs Configuration
# https://just-the-docs.com/docs/configuration/

# Color scheme (light, dark, auto)
color_scheme: auto

# Search configuration
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true
  focus_shortcut_key: 'k'

# Navigation configuration
nav_sort: case_insensitive

# Aux links (top right navigation)
aux_links:
  "🐙 GitHub":
    - "https://github.com/LessUp/yolo-toys"
  "📦 PyPI":
    - "https://pypi.org/project/yolo-toys/"
aux_links_new_tab: true

# External navigation links
nav_external_links:
  - title: "🚀 Live Demo"
    url: "https://lessup.github.io/yolo-toys/frontend/"
    hide_icon: false
    opens_in_new_tab: true

# Footer content
footer_content: "Copyright &copy; 2026 <a href=\"https://github.com/LessUp\">LessUp</a>. Distributed under <a href=\"https://github.com/LessUp/yolo-toys/blob/main/LICENSE\">MIT License</a>."

last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d %H:%M:%S"

# Back to top link
back_to_top: true
back_to_top_text: "返回顶部 / Back to top"

# Heading anchor links
heading_anchors: true

# Callouts (alerts)
callouts:
  highlight:
    color: yellow
  important:
    title: 重要 / Important
    color: blue
  new:
    title: 新功能 / New
    color: green
  note:
    title: 注意 / Note
    color: purple
  warning:
    title: 警告 / Warning
    color: red
  tip:
    title: 提示 / Tip
    color: green
  experimental:
    title: 实验性 / Experimental
    color: yellow

# Code copy button
copy_code: true

# KaTeX math rendering
kramdown:
  math_engine: katex
  input: GFM
  syntax_highlighter: rouge
  highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true
    span:
      line_numbers: false

# Timezone
timezone: Asia/Shanghai

# Exclusions from build
exclude:
  - "*.pt"
  - "*.onnx"
  - "*.engine"
  - "*.pkl"
  - "*.pth"
  - "*.ckpt"
  - .git
  - .github
  - .venv
  - venv
  - .env
  - .env.*
  - .pytest_cache
  - .ruff_cache
  - __pycache__
  - node_modules
  - vendor
  - app
  - frontend/js/*.map
  - frontend/*.map
  - tests
  - models
  - runs
  - uploads
  - deployments
  - config
  - scripts
  - Dockerfile
  - docker-compose.yml
  - Makefile
  - requirements*.txt
  - pyproject.toml
  - .pre-commit-config.yaml
  - .editorconfig
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - SECURITY.md
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - AGENTS.md
  - CLAUDE.md
  - release-notes.md
  - PROJECT_STRUCTURE.md

# Include processing
include:
  - _pages
  - _data

# Collections
collections:
  docs:
    permalink: "/:collection/:path"
    output: true
  changelog:
    permalink: "/:collection/:path"
    output: true

# Defaults for pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
  - scope:
      path: "docs"
      type: "pages"
    values:
      parent: "文档 / Documentation"
  - scope:
      path: "changelog"
      type: "pages"
    values:
      parent: "更新日志 / Changelog"
      nav_order: 100
  - scope:
      path: "README.md"
    values:
      permalink: "/"
      nav_exclude: false
  - scope:
      path: "index.md"
    values:
      permalink: "/"
      layout: home
      nav_order: 1
  - scope:
      path: "404.md"
    values:
      nav_exclude: true
      search_exclude: true
