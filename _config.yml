# Site Settings
# =============
title: YOLO-Toys
description: >-
  Multi-model vision inference platform with YOLOv8, DETR, OWL-ViT,
  Grounding DINO, and BLIP behind one FastAPI + WebSocket interface.
tagline: Multi-model vision inference with one API surface
repository: LessUp/yolo-toys

# URL Configuration
# -----------------
url: https://lessup.github.io
baseurl: /yolo-toys

# Author Information
author:
  name: LessUp
  github: LessUp

# Theme Configuration
# -------------------
remote_theme: just-the-docs/just-the-docs@v0.9.0

# Plugins
# -------
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  - jekyll-relative-links
  - jekyll-include-cache

# Color Scheme
# ------------
color_scheme: auto

# Search Configuration
# --------------------
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

# Navigation Configuration
# ------------------------
nav_sort: case_insensitive
nav_external_links: []

# Auxiliary Links (Top Right)
# ---------------------------
aux_links:
  "🐙 GitHub":
    - "https://github.com/LessUp/yolo-toys"
  "📖 Docs":
    - "/yolo-toys/docs/"
  "🚀 Quick Start":
    - "/yolo-toys/docs/getting-started/quickstart.html"
aux_links_new_tab: true

# Footer
# ------
footer_content: >
  Copyright &copy; 2026 <a href="https://github.com/LessUp">LessUp</a>.
  Distributed under <a href="https://github.com/LessUp/yolo-toys/blob/main/LICENSE">MIT License</a>.

last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d %H:%M"

# Back to Top
# -----------
back_to_top: true
back_to_top_text: "↑ Back to top"

# Heading Anchors
# ---------------
heading_anchors: true

# Callouts Configuration
# ----------------------
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

copy_code: true

# Kramdown Configuration
# ----------------------
kramdown:
  syntax_highlighter: rouge
  input: GFM
  syntax_highlighter_opts:
    block:
      line_numbers: true
    span:
      line_numbers: false

# Timezone
# --------
timezone: Asia/Shanghai

# Exclusions
# ----------
exclude:
  - "*.pt"
  - "*.onnx"
  - "*.engine"
  - "*.pkl"
  - "*.pth"
  - "*.ckpt"
  - .git
  - .github
  - .venv
  - venv
  - .env
  - .env.*
  - .pytest_cache
  - .ruff_cache
  - __pycache__
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - Dockerfile
  - docker-compose.yml
  - Makefile
  - requirements*.txt
  - pyproject.toml
  - .pre-commit-config.yaml
  - .editorconfig
  - LICENSE
  - SECURITY.md
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - AGENTS.md
  - CLAUDE.md
  - release-notes.md
  - PROJECT_STRUCTURE.md
  - "_data/!*"

# Collections
# -----------
collections:
  docs:
    permalink: "/:collection/:path"
    output: true
  changelog:
    permalink: "/:collection/:path"
    output: true

# Default Front Matter
# --------------------
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
  - scope:
      path: "docs"
      type: "pages"
    values:
      parent: "Documentation"
      nav_order: 10
  - scope:
      path: "changelog"
      type: "pages"
    values:
      parent: "Changelog"
      nav_order: 100
  - scope:
      path: "index.md"
    values:
      permalink: "/"
      layout: default
      nav_exclude: true
  - scope:
      path: "404.md"
    values:
      nav_exclude: true
      search_exclude: true
