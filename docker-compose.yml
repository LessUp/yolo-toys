version: '3.9'
services:
  app:
    build: .
    image: vision-det:latest
    container_name: vision-det
    restart: unless-stopped
    environment:
      - PORT=${PORT:-8000}
      - MODEL_NAME=${MODEL_NAME:-yolov8s.pt}
      - CONF_THRESHOLD=${CONF_THRESHOLD:-0.25}
      - IOU_THRESHOLD=${IOU_THRESHOLD:-0.45}
      - MAX_DET=${MAX_DET:-300}
      - DEVICE=${DEVICE:-}
      - SKIP_WARMUP=${SKIP_WARMUP:-}
      - ALLOW_ORIGINS=${ALLOW_ORIGINS:-*}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-10}
      - MAX_CONCURRENCY=${MAX_CONCURRENCY:-4}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - model-cache:/root/.cache
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/health' % os.getenv('PORT','8000'), timeout=2)" ]
      interval: 30s
      timeout: 5s
      retries: 3
    # volumes:
    #   - ./:/app:ro
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

volumes:
  model-cache:
