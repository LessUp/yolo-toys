# Docker Compose - Root Configuration
# For detailed deployment configs, see deployments/docker/

services:
  app:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      target: runtime
    image: yolo-toys:latest
    container_name: yolo-toys
    restart: unless-stopped
    env_file:
      - config/.env.example
    environment:
      - PORT=${PORT:-8000}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - model-cache:/app/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # Monitoring stack (optional)
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: yolo-toys-prometheus
    restart: unless-stopped
    volumes:
      - ./deployments/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:11.3.0
    container_name: yolo-toys-grafana
    restart: unless-stopped
    volumes:
      - ./deployments/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    profiles:
      - monitoring

volumes:
  model-cache:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
