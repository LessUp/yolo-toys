<!-- Custom Footer Scripts -->

<!-- Edit this page link -->
{% if site.github.repository_url and page.path %}
<script>
(function() {
  const footer = document.querySelector('.main-footer');
  if (footer) {
    const editLink = document.createElement('p');
    editLink.className = 'text-small text-grey-dk-000 mb-0';
    editLink.innerHTML = '<a href="{{ site.github.repository_url }}/edit/{{ site.github.source.branch | default: "main" }}/{{ page.path }}" target="_blank" rel="noopener">✏️ 编辑此页 / Edit this page</a>';
    footer.insertBefore(editLink, footer.firstChild);
  }
})();
</script>
{% endif %}

<!-- Keyboard shortcuts help -->
<script>
(function() {
  const showShortcuts = function(e) {
    if (e.key === '?' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      alert(`Keyboard Shortcuts:

⌘/Ctrl + K - Search documents
? - Show this help
↑/↓ - Navigate search results
↵ - Select result
Esc - Close search`);
    }
  };
  document.addEventListener('keydown', showShortcuts);
})();
</script>

<!-- Smooth scroll for anchor links -->
<script>
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function (e) {
    const target = document.querySelector(this.getAttribute('href'));
    if (target) {
      e.preventDefault();
      target.scrollIntoView({
        behavior: 'smooth',
        block: 'start'
      });
    }
  });
});
</script>
