  #   restart: unless-stopped
  #   runtime: nvidia
  #   environment:
  #     - PORT=8000
  #     - DEVICE=cuda:0
  #     - NVIDIA_VISIBLE_DEVICES=all
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - model-cache:/app/.cache
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

volumes:
  model-cache:
    driver: local
